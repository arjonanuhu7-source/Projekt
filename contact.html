<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - FaunaShqip</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">FaunaShqip</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Kreu</a></li>
                <li class="nav-item"><a class="nav-link" href="animals.html">Kafshët</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">Rreth Faqes</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">Kontakt</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-5">
    <h1 class="text-center mb-4">Na Kontakto</h1>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <form>
                <div class="mb-3">
                    <label class="form-label">Emri</label>
                    <input type="text" class="form-control" placeholder="Shkruaj emrin">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Shkruaj email-in">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mesazhi</label>
                    <textarea class="form-control" rows="4" placeholder="Shkruaj mesazhin"></textarea>
                </div>

                <button type="submit" class="btn btn-success w-100">
                    Dërgo Mesazhin
                </button>
            </form>

        </div>
    </div>
</main>

<footer class="bg-dark text-white text-center p-3">
    <p>© 2026 FaunaShqip</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
